---
base_packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - git
  - gnupg
  - jq
  - lsb-release
  - openssh-server
  - python3
  - python3-apt
  - sudo
  - tar
  - unzip

kernel_modules:
  - br_netfilter
  - overlay

sysctl_settings:
  net.ipv4.ip_forward: "1"
  net.bridge.bridge-nf-call-iptables: "1"
