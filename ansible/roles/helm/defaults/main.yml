---
helm_version: "v4.2.2"
helm_arch_map:
  x86_64: amd64
  aarch64: arm64
  arm64: arm64
helm_os: linux
helm_arch: "{{ helm_arch_map.get(ansible_architecture, ansible_architecture) }}"
helm_archive_url: "https://get.helm.sh/helm-{{ helm_version }}-{{ helm_os }}-{{ helm_arch }}.tar.gz"
helm_archive_path: "/tmp/helm-{{ helm_version }}-{{ helm_os }}-{{ helm_arch }}.tar.gz"
helm_extract_dir: "/tmp/helm-{{ helm_version }}"
helm_binary_versioned_path: "/usr/local/bin/helm-{{ helm_version }}"
helm_binary_path: /usr/local/bin/helm
helm_force_download: false
