apiVersion: v1
kind: Service
metadata:
  name: policy-reporter-gui
  namespace: policy-reporter
  labels:
    app.kubernetes.io/name: policy-reporter-gui
    app.kubernetes.io/part-of: policy-reporter
    kyverno-mvp.local/gui: "true"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/instance: policy-reporter
    app.kubernetes.io/name: policy-reporter-ui
  ports:
    - name: http
      port: 8080
      protocol: TCP
      targetPort: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: policy-reporter
  namespace: policy-reporter
spec:
  parentRefs:
    - name: kyverno-mvp
      namespace: envoy-gateway-system
  hostnames:
    - policy-reporter.kyverno-mvp.local
  rules:
    - backendRefs:
        - name: policy-reporter-gui
          port: 8080
