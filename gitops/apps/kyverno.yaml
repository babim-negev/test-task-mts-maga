apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://mirror.yandex.ru/helm/kyverno.github.io
    chart: kyverno
    targetRevision: 3.8.1
    helm:
      releaseName: kyverno
      values: |
        admissionController:
          replicas: 1
          serviceMonitor:
            enabled: true
        backgroundController:
          replicas: 1
          serviceMonitor:
            enabled: true
        cleanupController:
          replicas: 1
          serviceMonitor:
            enabled: true
        reportsController:
          replicas: 1
          serviceMonitor:
            enabled: true
        features:
          policyReports:
            enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /metadata/annotations
        - /metadata/labels
        - /spec/conversion
