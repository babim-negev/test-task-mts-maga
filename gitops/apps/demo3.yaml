apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno-demo3
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/babim-negev/test-task-mts-maga.git
    targetRevision: main
    path: demo/gitops
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno-demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
