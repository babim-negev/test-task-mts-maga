apiVersion: v1
kind: Pod
metadata:
  name: good-init-container-pod
  namespace: kyverno-demo
spec:
  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  initContainers:
    - name: prepare
      image: busybox:1.37.0
      command: ["sh", "-c", "mkdir -p /work"]
      securityContext:
        allowPrivilegeEscalation: false
        privileged: false
        runAsNonRoot: true
        runAsUser: 1000
        capabilities:
          drop:
            - ALL
  containers:
    - name: app
      image: nginxinc/nginx-unprivileged:1.27.4-alpine
      securityContext:
        allowPrivilegeEscalation: false
        privileged: false
        runAsNonRoot: true
        runAsUser: 101
        capabilities:
          drop:
            - ALL
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi
