apiVersion: v1
kind: Pod
metadata:
  name: bad-missing-limits-pod
  namespace: kyverno-demo
spec:
  securityContext:
    runAsNonRoot: true
  containers:
    - name: app
      image: nginx:1.27.4-alpine
      securityContext:
        privileged: false
        runAsNonRoot: true
        runAsUser: 101
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
