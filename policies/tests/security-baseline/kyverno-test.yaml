name: security-baseline
policies:
  - ../../clusterpolicies/disallow-privileged-containers.yaml
  - ../../clusterpolicies/require-non-root-containers.yaml
  - ../../clusterpolicies/disallow-latest-image-tag.yaml
  - ../../clusterpolicies/require-resource-requests-limits.yaml
resources:
  - ../../../demo/resources/good-pod.yaml
  - ../../../demo/resources/bad-privileged-pod.yaml
  - ../../../demo/resources/bad-root-pod.yaml
  - ../../../demo/resources/bad-latest-pod.yaml
  - ../../../demo/resources/bad-no-tag-pod.yaml
  - ../../../demo/resources/bad-no-resources-pod.yaml
results:
  - policy: disallow-privileged-containers
    rule: require-non-privileged-containers
    resources:
      - good-pod
    kind: Pod
    result: pass
  - policy: disallow-privileged-containers
    rule: require-non-privileged-containers
    resources:
      - bad-privileged-pod
    kind: Pod
    result: pass
  - policy: require-non-root-containers
    rule: require-run-as-non-root
    resources:
      - good-pod
    kind: Pod
    result: pass
  - policy: require-non-root-containers
    rule: require-run-as-non-root
    resources:
      - bad-root-pod
    kind: Pod
    result: fail
  - policy: disallow-latest-image-tag
    rule: require-image-tag
    resources:
      - good-pod
    kind: Pod
    result: pass
  - policy: disallow-latest-image-tag
    rule: require-image-tag
    resources:
      - bad-no-tag-pod
    kind: Pod
    result: fail
  - policy: disallow-latest-image-tag
    rule: disallow-latest-image-tag
    resources:
      - good-pod
    kind: Pod
    result: pass
  - policy: disallow-latest-image-tag
    rule: disallow-latest-image-tag
    resources:
      - bad-latest-pod
    kind: Pod
    result: fail
  - policy: require-resource-requests-limits
    rule: require-container-resources
    resources:
      - good-pod
    kind: Pod
    result: pass
  - policy: require-resource-requests-limits
    rule: require-container-resources
    resources:
      - bad-no-resources-pod
    kind: Pod
    result: fail
