name: Проверка политик Kyverno

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  policy-tests:
    name: Проверить политики и demo manifests
    runs-on: ubuntu-latest
    env:
      KYVERNO_VERSION: v1.14.4
    steps:
      - name: Скачать репозиторий
        uses: actions/checkout@v4

      - name: Установить Kyverno CLI
        run: |
          set -euo pipefail
          curl -L \
            "https://github.com/kyverno/kyverno/releases/download/${KYVERNO_VERSION}/kyverno-cli_${KYVERNO_VERSION}_linux_x86_64.tar.gz" \
            -o kyverno-cli.tar.gz
          tar -xzf kyverno-cli.tar.gz
          sudo install kyverno /usr/local/bin/kyverno
          kyverno version

      - name: Запустить тесты политик
        run: kyverno test policies/tests --detailed-results --remove-color

      - name: Проверить валидный demo manifest
        run: kyverno apply policies/clusterpolicies -r demo/resources/good-pod.yaml

      - name: Проверить, что небезопасные manifests отклоняются
        run: |
          set -euo pipefail
          for resource in demo/resources/bad-*-pod.yaml; do
            if kyverno apply policies/clusterpolicies -r "$resource"; then
              echo "Небезопасный manifest не был отклонен: $resource" >&2
              exit 1
            fi
          done

  ansible-syntax:
    name: Проверить синтаксис Ansible playbook
    runs-on: ubuntu-latest
    steps:
      - name: Скачать репозиторий
        uses: actions/checkout@v4

      - name: Установить Ansible
        run: python3 -m pip install --disable-pip-version-check ansible

      - name: Проверить синтаксис playbook
        run: ansible-playbook --syntax-check -i 'localhost,' ansible/playbook.yml
